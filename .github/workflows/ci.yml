name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "code=true" >> "$GITHUB_OUTPUT"   # cannot diff -> run everything (safe default)
            exit 0
          fi
          changed="$(git diff --name-only "$base" HEAD)"
          echo "changed files:"; echo "$changed"
          # DATA-ONLY = result rows/artifacts (results/<benchmark>/<system>/...) or the generated leaderboard.
          # <benchmark>/<system> are canonical slugs: ^[a-z0-9][a-z0-9-]*$ (scripts/canonical_slugs.py),
          # so lowercase-letters/digits/hyphens only. Any path that does NOT match (incl. results/schema/,
          # or a non-slug name) is conservatively treated as CODE -> full CI runs (safe default).
          # data-only = a result-partition file results/<slug>/<slug>/... (slug = ^[a-z0-9][a-z0-9-]*)
          #             OR leaderboard.json. results/schema/** is ALWAYS code (schema drives validation).
          data_re='^(results/[a-z0-9][a-z0-9-]*/[a-z0-9][a-z0-9-]*/|leaderboard\.json$)'
          code_files="$( { echo "$changed" | grep -vE "$data_re"; echo "$changed" | grep -E '^results/schema/'; } | grep -v '^$' | sort -u )"
          if [ -n "$code_files" ]; then
            echo "code files present -> code=true"; echo "$code_files"
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi
  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12", cache: "pip" }
      - run: pip install -e ".[dev,engrava]"
      - run: ruff check adapters runners scripts
      - run: ruff format --check adapters runners scripts
  typecheck:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12", cache: "pip" }
      - run: pip install -e ".[dev,engrava]"
      - run: mypy --strict adapters scripts
  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "${{ matrix.python-version }}", cache: "pip" }
      # Install the engrava extra so the engrava-gated suite (the docs reproduce-example
      # execution test, plus the AMB / LongMemEval-V2 integration tests) actually runs
      # here instead of skipping. It stays offline and spends nothing: OPENAI_API_KEY is
      # never set in CI, so the docs test takes the free --smoke path.
      - run: pip install -e ".[dev,engrava]"
      # Cache the sentence-transformers model (all-MiniLM-L12-v2) the smoke path
      # downloads, so it isn't re-fetched on every run. First run populates it.
      - name: Cache HuggingFace models
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: hf-all-minilm-l12-v2
      - run: pytest -q
  dependency-audit:
    name: Dependency CVE audit
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12", cache: "pip" }
      # Install the package NON-editable so its third-party dependencies land in
      # the environment, then uninstall the self-package before auditing. An
      # editable install (`-e`) builds an `*.editable` wheel that pip-audit
      # reports as a SkippedDependency, and `--strict` hard-fails on ANY skip.
      - name: Install package
        run: |
          # Upgrade pip first: pip-audit --strict audits the whole environment,
          # including pip itself, and the runner image can ship a pip with a
          # freshly disclosed CVE. Upgrading clears it for real rather than
          # ignoring the finding.
          python -m pip install --upgrade pip
          pip install .
          # Uninstall the self-package: engrava-benchmark is not on PyPI (the repo
          # is the unit of distribution), so pip-audit cannot resolve it and
          # `--strict` would hard-fail on it. We only want to audit third-party
          # deps for CVEs, which remain installed after this.
          pip uninstall -y engrava-benchmark
      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit --strict
  validate-results:
    runs-on: ubuntu-latest   # ALWAYS runs (result-row/leaderboard validity always matters)
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12", cache: "pip" }
      - run: pip install -e ".[dev]"
      - run: python scripts/validate_results.py
      - name: Rebuild leaderboard (must be in sync)
        run: |
          python scripts/build_leaderboard.py
          if ! git diff --quiet -- leaderboard.json; then
            echo "leaderboard.json out of sync"; git --no-pager diff -- leaderboard.json; exit 1
          fi
  ci-gate:
    needs: [changes, lint, typecheck, test, dependency-audit, validate-results]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate required outcome
        run: |
          # changes + validate-results MUST succeed (they always run).
          for r in "${{ needs.changes.result }}" "${{ needs.validate-results.result }}"; do
            if [ "$r" != "success" ]; then
              echo "Required always-on job did not succeed: $r"; exit 1
            fi
          done
          # code jobs may be success OR skipped (results-only PR), but never failure/cancelled.
          for r in "${{ needs.lint.result }}" "${{ needs.typecheck.result }}" "${{ needs.test.result }}" "${{ needs.dependency-audit.result }}"; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "Code job did not pass: $r"; exit 1
            fi
          done
          echo "Gate OK (changes+validate-results succeeded; code jobs passed or were skipped)."
