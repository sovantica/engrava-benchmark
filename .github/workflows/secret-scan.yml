name: Secret scanning

# Generic secret detection (gitleaks, built-in rule set). Catches accidental
# commits of API keys, tokens, .env files, private keys, etc. from any
# contributor. Uses only gitleaks' built-in patterns — no project-specific
# rules — so this workflow reveals nothing about internal naming or structure.
#
# gitleaks is run from its official release binary in a plain `run:` step rather
# than via the gitleaks-action: this repository's Actions policy allows only
# GitHub-owned (actions/*) and verified-publisher actions, and the gitleaks
# action is neither. Pinning the binary by version + SHA-256 gives a reproducible
# scan without taking a dependency on a non-allowed third-party action.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"

jobs:
  gitleaks:
    name: Gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the scan covers the whole reachable commit range,
          # not just the tip — a secret introduced in any commit is caught.
          fetch-depth: 0

      - name: Install gitleaks (pinned binary, checksum-verified)
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Scan repository history
        run: |
          set -euo pipefail
          # `git` mode scans the commit history; exit code 1 = leaks found.
          ./gitleaks git . --redact --verbose --exit-code 1
